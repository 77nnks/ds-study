// ── COMPONENT ──────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("plan");
  const[activePhase,setActivePhase]=useState(1);
  const[activeWeek,setActiveWeek]=useState(1);
  const[done,setDone]=useState({});
  const[saveStatus,setSaveStatus]=useState("idle");
  const[loaded,setLoaded]=useState(false);
  const[memos,setMemos]=useState([]);
  const[memoTitle,setMemoTitle]=useState("");
  const[memoContent,setMemoContent]=useState("");
  const[memoTag,setMemoTag]=useState("動画URL");
  const memoIdRef=useRef(1);

  // 起動時: localStorageから読み込み
  useEffect(()=>{
    try{
      const raw=localStorage.getItem("ds-progress");
      if(raw) setDone(JSON.parse(raw));
    }catch(_){}
    try{
      const rawM=localStorage.getItem("ds-memos");
      if(rawM){
        const parsed=JSON.parse(rawM);
        setMemos(parsed);
        if(parsed.length>0) memoIdRef.current=Math.max(...parsed.map(m=>m.id))+1;
      }
    }catch(_){}
    setLoaded(true);
  },[]);

  // doneが変わるたびに自動保存
  useEffect(()=>{
    if(!loaded) return;
    setSaveStatus("saving");
    try{
      localStorage.setItem("ds-progress",JSON.stringify(done));
      setSaveStatus("saved");
      setTimeout(()=>setSaveStatus("idle"),2000);
    }catch(_){
      setSaveStatus("error");
      setTimeout(()=>setSaveStatus("idle"),3000);
    }
  },[done,loaded]);

  const toggleDone=key=>setDone(p=>({...p,[key]:!p[key]}));

  const resetProgress=()=>{
    if(!window.confirm("進捗をリセットしますか？")) return;
    setDone({});
    localStorage.removeItem("ds-progress");
  };

  // メモの保存
  useEffect(()=>{
    if(!loaded) return;
    try{ localStorage.setItem("ds-memos",JSON.stringify(memos)); }catch(_){}
  },[memos,loaded]);

  const addMemo=()=>{
    if(!memoContent.trim()) return;
    const now=new Date();
    const dateStr=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,"0")}/${String(now.getDate()).padStart(2,"0")} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    setMemos(p=>[{id:memoIdRef.current++,title:memoTitle.trim()||"無題",content:memoContent.trim(),tag:memoTag,date:dateStr},...p]);
    setMemoTitle("");
    setMemoContent("");
  };

  const deleteMemo=id=>setMemos(p=>p.filter(m=>m.id!==id));

  const MEMO_TAGS=["動画URL","キーワード","疑問点","気づき","その他"];
  const MEMO_TAG_COLOR={"動画URL":"#818CF8","キーワード":"#34D399","疑問点":"#FBBF24","気づき":"#60A5FA","その他":"#9CA3AF"};

  const allDays=PHASES.flatMap(ph=>ph.weeks_data.flatMap(w=>w.days));
  const totalTasks=allDays.length;
  const doneTasks=Object.values(done).filter(Boolean).length;
  const overallPct=Math.round(doneTasks/totalTasks*100);

  const phase=PHASES.find(p=>p.id===activePhase);
  const weekData=phase?.weeks_data.find(w=>w.week===activeWeek);

  return(
    <div style={{fontFamily:"'Hiragino Sans','Yu Gothic',sans-serif",background:"#08080f",minHeight:"100vh",color:"#e2e2ee"}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(160deg,#0f0c29,#1a1040,#0a1020)",padding:"24px 16px 20px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        <div style={{maxWidth:660,margin:"0 auto"}}>
          <div style={{fontSize:10,letterSpacing:3,color:"#818CF8",textTransform:"uppercase",marginBottom:4}}>動画メイン × 30〜60分/日 × 2〜3ヶ月</div>
          <div style={{fontSize:22,fontWeight:900,lineHeight:1.2,marginBottom:2}}>DS検定★ 完全攻略ガイド</div>
          <div style={{fontSize:12,color:"#555",marginBottom:16}}>データサイエンティスト検定 リテラシーレベル</div>
          {/* progress */}
          <div style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:"12px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,marginBottom:6}}>
              <span style={{color:"#888"}}>総合進捗</span>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:saveStatus==="saved"?"#34D399":saveStatus==="saving"?"#FBBF24":saveStatus==="error"?"#F87171":"transparent",transition:"color .3s"}}>
                  {saveStatus==="saving"?"⏳ 保存中":saveStatus==="saved"?"✅ 保存済み":saveStatus==="error"?"❌ 保存失敗":"✅ 保存済み"}
                </span>
                <span style={{color:"#818CF8",fontWeight:800}}>{overallPct}%（{doneTasks}/{totalTasks}）</span>
              </div>
            </div>
            <div style={{background:"rgba(255,255,255,0.07)",borderRadius:99,height:7,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:99,width:`${overallPct}%`,background:"linear-gradient(90deg,#818CF8,#34D399,#FBBF24)",transition:"width .5s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
              <span style={{fontSize:11,color:"#444"}}>
                {!loaded?"📂 読み込み中…":doneTasks===0?"📂 新規スタート":"📂 前回の続きから再開中"}
              </span>
              {doneTasks>0&&(
                <button onClick={resetProgress} style={{fontSize:11,color:"#555",background:"none",border:"1px solid #333",borderRadius:6,padding:"2px 8px"}}>リセット</button>
              )}
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:660,margin:"0 auto",padding:"0 14px"}}>

        {/* TABS */}
        <div style={{display:"flex",gap:4,marginTop:16,marginBottom:18}}>
          {[["plan","📅 週別プラン"],["videos","▶️ 動画リスト"],["tips","💡 学習のコツ"],["memo","📝 メモ"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{
              flex:1,padding:"9px 4px",border:"none",borderRadius:10,
              background:tab===k?"rgba(129,140,248,0.15)":"rgba(255,255,255,0.04)",
              color:tab===k?"#818CF8":"#666",fontWeight:tab===k?700:400,fontSize:12,
              borderBottom:tab===k?"2px solid #818CF8":"2px solid transparent",transition:"all .2s"
            }}>{l}</button>
          ))}
        </div>

        {/* PLAN TAB */}
        {tab==="plan"&&(
          <>
            {/* Phase selector */}
            <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
              {PHASES.map(ph=>(
                <button key={ph.id} onClick={()=>{setActivePhase(ph.id);setActiveWeek(ph.weeks_data[0].week);}}
                  style={{minWidth:130,padding:"10px 12px",border:`1.5px solid ${activePhase===ph.id?ph.color:"rgba(255,255,255,0.08)"}`,
                    borderRadius:12,textAlign:"left",background:activePhase===ph.id?ph.bg:"rgba(255,255,255,0.03)",transition:"all .2s"}}>
                  <div style={{fontSize:10,color:ph.color,fontWeight:700,letterSpacing:1}}>{ph.label}</div>
                  <div style={{fontSize:13,fontWeight:700,color:activePhase===ph.id?"#eee":"#777",lineHeight:1.3,marginTop:2}}>{ph.title}</div>
                  <div style={{fontSize:11,color:"#444",marginTop:2}}>{ph.weeks}</div>
                </button>
              ))}
            </div>

            {/* Week selector */}
            {phase&&(
              <div style={{display:"flex",gap:6,marginBottom:16}}>
                {phase.weeks_data.map(w=>{
                  const wDone=w.days.filter((_,i)=>done[`${w.week}-${i}`]).length;
                  const pct=Math.round(wDone/w.days.length*100);
                  return(
                    <button key={w.week} onClick={()=>setActiveWeek(w.week)} style={{
                      flex:1,padding:"10px 8px",border:`1.5px solid ${activeWeek===w.week?phase.color:"rgba(255,255,255,0.07)"}`,
                      borderRadius:10,textAlign:"center",background:activeWeek===w.week?phase.bg:"rgba(255,255,255,0.03)",transition:"all .2s"}}>
                      <div style={{fontSize:11,color:activeWeek===w.week?phase.color:"#444",fontWeight:700}}>第{w.week}週</div>
                      <div style={{fontSize:18,fontWeight:800,color:activeWeek===w.week?phase.color:"#333",marginTop:1}}>{pct}%</div>
                    </button>
                  );
                })}
              </div>
            )}

            {/* Week detail */}
            {weekData&&(
              <>
                <div style={{background:phase.bg,border:`1px solid ${phase.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
                  <div style={{fontSize:11,color:phase.color,fontWeight:700,letterSpacing:1,marginBottom:3}}>{phase.label} ／ 第{weekData.week}週</div>
                  <div style={{fontSize:17,fontWeight:800,marginBottom:4}}>{weekData.title}</div>
                  <div style={{fontSize:13,color:"#aaa"}}>🎯 {weekData.checkpoint}</div>
                </div>
                {weekData.days.map((d,i)=>{
                  const key=`${weekData.week}-${i}`;
                  const isDone=done[key];
                  const ts=typeStyle[d.type]||{bg:"rgba(255,255,255,0.07)",color:"#aaa"};
                  return(
                    <div key={i} onClick={()=>toggleDone(key)} style={{
                      display:"flex",gap:10,alignItems:"flex-start",
                      padding:"12px 14px",borderRadius:12,marginBottom:8,
                      background:isDone?"rgba(255,255,255,0.02)":"rgba(255,255,255,0.05)",
                      border:`1px solid ${isDone?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.09)"}`,
                      opacity:isDone?0.5:1,transition:"all .2s",cursor:"pointer"}}>
                      <div style={{
                        width:20,height:20,borderRadius:5,flexShrink:0,marginTop:2,
                        background:isDone?phase.color:"transparent",
                        border:`2px solid ${isDone?phase.color:"#444"}`,
                        display:"flex",alignItems:"center",justifyContent:"center",
                        fontSize:11,color:"#000",fontWeight:800,transition:"all .2s"
                      }}>{isDone?"✓":""}</div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                          <span style={{fontSize:11,fontWeight:700,color:phase.color,background:phase.bg,padding:"1px 8px",borderRadius:99}}>{d.day}曜</span>
                          <span style={{fontSize:11,fontWeight:600,color:ts.color,background:ts.bg,padding:"1px 8px",borderRadius:99}}>{d.type}</span>
                          <span style={{fontSize:11,color:"#555",marginLeft:"auto"}}>⏱ {d.min}分</span>
                        </div>
                        <div style={{fontSize:14,fontWeight:600,marginBottom:d.video&&d.video!=="—"?3:0,textDecoration:isDone?"line-through":"none"}}>{d.task}</div>
                        {d.video&&d.video!=="—"&&<div style={{fontSize:12,color:"#555"}}>▶ {d.video}</div>}
                      </div>
                    </div>
                  );
                })}
                <div style={{background:"rgba(255,255,255,0.03)",borderRadius:12,padding:"12px 14px",marginTop:4}}>
                  <div style={{fontSize:12,color:"#555",marginBottom:8,fontWeight:700}}>🔑 今週のキーワード</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {weekData.keywords.map(kw=>(
                      <span key={kw} style={{fontSize:12,padding:"3px 10px",borderRadius:99,background:phase.bg,color:phase.color,border:`1px solid ${phase.border}`}}>{kw}</span>
                    ))}
                  </div>
                </div>
              </>
            )}
          </>
        )}

        {/* VIDEOS TAB */}
        {tab==="videos"&&(
          <div>
            <div style={{fontSize:13,color:"#555",marginBottom:14}}>動画メイン学習に最適な無料リソースを厳選。すべて無料で使えます。</div>
            {VIDEOS.map((v,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.04)",borderRadius:14,padding:"14px 16px",marginBottom:12,borderLeft:`3px solid ${v.color}`}}>
                <div style={{fontWeight:800,fontSize:14,color:v.color,marginBottom:4}}>{v.category}</div>
                <div style={{fontSize:12,color:"#777",marginBottom:10}}>{v.desc}</div>
                {v.items.map((item,j)=>(
                  <div key={j} style={{fontSize:13,color:"#bbb",padding:"5px 0",borderBottom:j<v.items.length-1?"1px solid rgba(255,255,255,0.05)":"none",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:v.color,fontSize:10}}>▶</span>{item}
                  </div>
                ))}
                {v.url&&<a href={v.url} target="_blank" rel="noopener noreferrer" style={{display:"block",marginTop:10,fontSize:12,color:"#555",wordBreak:"break-all"}}>🔗 {v.url}</a>}
              </div>
            ))}
            <div style={{background:"rgba(251,191,36,0.07)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:12,padding:"14px 16px"}}>
              <div style={{fontWeight:700,color:"#FBBF24",marginBottom:6,fontSize:14}}>📗 唯一の有料教材（推奨）</div>
              <div style={{fontSize:13,color:"#ccc",lineHeight:1.8}}>
                <strong>公式リファレンスブック（第2版）</strong> 約2,000円<br/>
                付属の模擬試験90問が最大の価値。動画で概念を理解した後、この本で問題演習。<br/>
                <span style={{color:"#666"}}>他の参考書は買わなくてOK！これ1冊で十分。</span>
              </div>
            </div>
          </div>
        )}

        {/* TIPS TAB */}
        {tab==="tips"&&(
          <div>
            {TIPS.map((t,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.04)",borderLeft:`3px solid ${t.color}`,borderRadius:"0 12px 12px 0",padding:"14px 16px",marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <span style={{fontSize:20}}>{t.icon}</span>
                  <div style={{fontWeight:700,fontSize:14,color:t.color}}>{t.title}</div>
                </div>
                <div style={{fontSize:13,color:"#bbb",lineHeight:1.7}}>{t.body}</div>
              </div>
            ))}
            <div style={{background:"rgba(248,113,113,0.07)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:14,padding:"14px 16px",marginTop:4}}>
              <div style={{fontWeight:800,fontSize:15,color:"#F87171",marginBottom:10}}>🎯 試験当日のポイント</div>
              {[["⏱","90問・90分なので1問あたり約1分。迷ったら後でフラグを立てて次へ進む"],["🖥","CBT方式（PC受験）。マウス操作に慣れておく"],["📐","電卓持ち込み可（関数電卓は不可）。計算問題は少ないが一応持参"],["🧘","試験前夜は詰め込まない。前日は軽い復習だけ。睡眠が最高の対策"]].map(([icon,text],i)=>(
                <div key={i} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:i<3?"1px solid rgba(255,255,255,0.05)":"none"}}>
                  <span style={{fontSize:16,flexShrink:0}}>{icon}</span>
                  <span style={{fontSize:13,color:"#ccc"}}>{text}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* MEMO TAB */}
        {tab==="memo"&&(
          <div>
            {/* 入力フォーム */}
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:"#818CF8",marginBottom:10}}>新しいメモを追加</div>
              {/* タグ選択 */}
              <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                {MEMO_TAGS.map(t=>(
                  <button key={t} onClick={()=>setMemoTag(t)} style={{
                    fontSize:11,padding:"3px 10px",borderRadius:99,border:`1px solid ${memoTag===t?MEMO_TAG_COLOR[t]:"rgba(255,255,255,0.1)"}`,
                    background:memoTag===t?`rgba(${t==="動画URL"?"129,140,248":t==="キーワード"?"52,211,153":t==="疑問点"?"251,191,36":t==="気づき"?"96,165,250":"156,163,175"},0.15)`:"transparent",
                    color:memoTag===t?MEMO_TAG_COLOR[t]:"#555",cursor:"pointer",transition:"all .15s"
                  }}>{t}</button>
                ))}
              </div>
              {/* タイトル */}
              <input
                value={memoTitle}
                onChange={e=>setMemoTitle(e.target.value)}
                placeholder="タイトル（省略可）"
                style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"8px 12px",color:"#e2e2ee",fontSize:13,marginBottom:8,outline:"none",boxSizing:"border-box"}}
              />
              {/* 内容 */}
              <textarea
                value={memoContent}
                onChange={e=>setMemoContent(e.target.value)}
                placeholder="動画URLやメモ内容を入力..."
                rows={3}
                style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"8px 12px",color:"#e2e2ee",fontSize:13,resize:"vertical",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}
              />
              <button onClick={addMemo} style={{
                marginTop:8,width:"100%",padding:"9px",borderRadius:10,border:"none",
                background:"rgba(129,140,248,0.2)",color:"#818CF8",fontWeight:700,fontSize:13,
                cursor:"pointer",transition:"all .2s"
              }}>＋ 保存する</button>
            </div>

            {/* メモ一覧 */}
            {memos.length===0?(
              <div style={{textAlign:"center",padding:"40px 0",color:"#444",fontSize:13}}>メモはまだありません</div>
            ):(
              memos.map(m=>{
                const tc=MEMO_TAG_COLOR[m.tag]||"#9CA3AF";
                const isUrl=m.content.match(/^https?:\/\//);
                return(
                  <div key={m.id} style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"12px 14px",marginBottom:8,borderLeft:`3px solid ${tc}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:10,padding:"2px 8px",borderRadius:99,background:`rgba(0,0,0,0.3)`,color:tc,border:`1px solid ${tc}`}}>{m.tag}</span>
                        <span style={{fontSize:13,fontWeight:700,color:"#ccc"}}>{m.title}</span>
                      </div>
                      <button onClick={()=>deleteMemo(m.id)} style={{fontSize:14,color:"#444",background:"none",border:"none",cursor:"pointer",padding:"0 2px",lineHeight:1,flexShrink:0}}>✕</button>
                    </div>
                    {isUrl?(
                      <a href={m.content} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:"#60A5FA",wordBreak:"break-all",display:"block",marginBottom:4}}>{m.content}</a>
                    ):(
                      <div style={{fontSize:13,color:"#bbb",whiteSpace:"pre-wrap",wordBreak:"break-all",marginBottom:4}}>{m.content}</div>
                    )}
                    <div style={{fontSize:11,color:"#444"}}>{m.date}</div>
                  </div>
                );
              })
            )}
          </div>
        )}

        <div style={{height:40}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
